<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABCDrop List Airdrop</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="sticky-bar">
    <div class="input-container">
        <label for="fileInput">Search Airdrop : </label>
        <input list="fileList" id="fileInput" placeholder="type airdrop name...">
        <datalist id="fileList"></datalist>
        <div class="button-group">
            <button onclick="loadFile()">Load</button>
            <button id="notifButton" onclick="toggleNotifBox()">🔔</button>
        </div>
    </div>
    <!-- Notifikasi Box -->
    <div id="notifBox" class="notif-box hidden">
        <div id="notifContent" class="notif-content">
            <!-- Konten notifikasi akan dimuat di sini -->
        </div>
    </div>
</div>

<div class="container">
    <div id="completion-message" class="hidden">
        <p>You have completed all airdrop tasks. Click <strong>Continue</strong> if you're not done yet, or click <strong>Reset</strong> to switch to another airdrop.</p>
        <div class="button-container">
            <button onclick="continueTask()">Continue</button>
            <button onclick="resetTask()">Reset</button>
        </div>
    </div>

    <div id="list-container">
        <!-- List akan ditampilkan di sini -->
    </div>
</div>

<script src="js/main.js"></script>

</body>
</html>
