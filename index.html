<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baca File TXT dari GitHub</title>
    <style>
        .input-container {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .input-container input {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 8px;
        }
        .input-container button {
            padding: 8px 16px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .input-container button:hover {
            background-color: #0056b3;
        }
        .output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9f9f9;
            white-space: pre-wrap; /* Untuk mempertahankan format teks */
        }
    </style>
</head>
<body>

    <div class="input-container">
        <input list="fileList" id="fileInput" placeholder="Pilih file...">
        <datalist id="fileList"></datalist>
        <button onclick="loadFile()">Load</button>
    </div>

    <div class="output" id="output"></div>

    <script>
        const repoOwner = 'abcdrop';          // Nama pemilik repository
        const repoName = 'airdrop';           // Nama repository
        const folderPath = 'list';            // Folder tempat file .txt disimpan

        // Mengambil daftar file dari GitHub API
        async function fetchFileList() {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`
                );
                if (!response.ok) {
                    throw new Error('Gagal mengambil daftar file');
                }
                const files = await response.json();
                const datalist = document.getElementById('fileList');
                files.forEach(file => {
                    if (file.name.endsWith('.txt')) {
                        const fileNameWithoutExtension = file.name.replace('.txt', '');
                        const option = document.createElement('option');
                        option.value = fileNameWithoutExtension;
                        datalist.appendChild(option);
                    }
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Memuat isi file yang dipilih
        async function loadFile() {
            const fileInput = document.getElementById('fileInput').value;
            if (!fileInput) {
                alert('Silakan pilih file terlebih dahulu!');
                return;
            }

            try {
                const response = await fetch(
                    `https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/${folderPath}/${fileInput}.txt`
                );
                if (!response.ok) {
                    throw new Error('File tidak ditemukan');
                }
                const text = await response.text();
                document.getElementById('output').textContent = text;
            } catch (error) {
                alert('Terjadi kesalahan: ' + error.message);
            }
        }

        // Memanggil fungsi untuk mengambil daftar file saat halaman dimuat
        fetchFileList();
    </script>

</body>
</html>
